name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: bjail

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            apt_packages: ""
            linker: ""
          - target: x86_64-unknown-linux-musl
            apt_packages: ""
            linker: ""
          - target: aarch64-unknown-linux-gnu
            apt_packages: "gcc-aarch64-linux-gnu"
            linker: "aarch64-linux-gnu-gcc"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux cross toolchain
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package release artifacts
        id: package
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME:-manual}"
          TARGET="${{ matrix.target }}"
          ARCHIVE_BASENAME="${BIN_NAME}-${VERSION}-${TARGET}"
          STAGING_DIR="dist/${ARCHIVE_BASENAME}"

          mkdir -p "${STAGING_DIR}"
          cp "target/${TARGET}/release/${BIN_NAME}" "${STAGING_DIR}/"
          cp README.md LICENSE "${STAGING_DIR}/"

          tar -C dist -czf "dist/${ARCHIVE_BASENAME}.tar.gz" "${ARCHIVE_BASENAME}"
          sha256sum "dist/${ARCHIVE_BASENAME}.tar.gz" > "dist/${ARCHIVE_BASENAME}.tar.gz.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
